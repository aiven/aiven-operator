name: lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: The git ref to run checks against
        required: true
        type: string
    outputs:
      commitlint:
        value: ${{ jobs.commitlint.outputs.result }}
      lint-go:
        value: ${{ jobs.lint-go.outputs.result }}
      trunk:
        value: ${{ jobs.trunk.outputs.result }}
      codeql_analysis:
        value: ${{ jobs.codeql_analysis.outputs.result }}
      kustomize_can_build_deployment:
        value: ${{ jobs.kustomize_can_build_deployment.outputs.result }}

jobs:
  commitlint:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  lint-go:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_call'
      || (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip workflows'))
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task lint:go

  trunk:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    permissions:
      checks: write # For trunk to post annotations
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: trunk-io/trunk-action@v1
  codeql_analysis:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
  kustomize_can_build_deployment:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: karancode/kustomize-github-action@master
        with:
          kustomize_version: 4.5.7
          kustomize_build_dir: config/default
          kustomize_output_file: deployment.yaml
          # TODO: remove token once https://github.com/karancode/kustomize-github-action/issues/46 is resolved
          token: ${{ github.token }}
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_ACCESS_TOKEN }}
