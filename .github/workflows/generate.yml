name: generate files

on:
  pull_request: {}

permissions:
  actions: read
  checks: write
  contents: write
  security-events: write
  statuses: write

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.auto_commit.outputs.commit-hash }}
      changes_detected: ${{ steps.detect.outputs.changes_detected }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
      - run: curl https://get.trunk.io -fsSL | bash
      - name: generate files
        run: make generate
      - name: detect changes
        id: detect
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          fi
      - name: commit generated files
        if: steps.detect.outputs.changes_detected == 'true'
        id: auto_commit
        uses: planetscale/ghcommit-action@v0.2.20
        with:
          commit_message: "chore(userconfigs): generate files"
          repo: ${{ github.repository }}
          branch: ${{ github.event.pull_request.head.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run_lint:
    needs: generate
    if: needs.generate.outputs.changes_detected == 'true'
    uses: ./.github/workflows/lint.yml
    with:
      ref: ${{ needs.generate.outputs.commit_hash }}

  report_statuses:
    needs: [generate, run_lint]
    if: always() && needs.generate.outputs.changes_detected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/report-statuses
        with:
          sha: ${{ needs.generate.outputs.commit_hash }}
          statuses: >-
            {
              "generate": "success",
              "commitlint": "${{ needs.run_lint.outputs.commitlint }}",
              "lint-go": "${{ needs.run_lint.outputs.lint-go }}",
              "trunk": "${{ needs.run_lint.outputs.trunk }}",
              "codeql_analysis": "${{ needs.run_lint.outputs.codeql_analysis }}",
              "kustomize_can_build_deployment": "${{ needs.run_lint.outputs.kustomize_can_build_deployment }}"
            }
